services:
  scan:
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: quanterback:dev
    command: supercronic /app/docker/cron/scheduler.cron
    volumes:
      - ./data:/data
      - ./config:/config:ro
    environment:
      - TZ=America/New_York
    restart: unless-stopped

  control-bot:
    image: quanterback:dev
    command: quanterback control-bot
    depends_on:
      - scan
    volumes:
      - ./data:/data
      - ./config:/config:ro
    restart: unless-stopped

  chat-bot:
    image: quanterback:dev
    command: quanterback chat-bot
    profiles: ["research"]
    depends_on:
      - scan
    volumes:
      - ./data:/data
      - ./config:/config:ro
    restart: unless-stopped
