[scan]
watchlist_path = "/config/watchlist.txt"

[market]
# Broad-market ETF used for trend context, relative-strength (RS) calc,
# and buy-and-hold benchmark. VOO = Vanguard S&P 500 (expense 0.03%).
# Alternatives: SPY (0.0945%), IVV (0.03%), VTI (Total Market 0.03%),
# QQQ (Nasdaq-100 — different exposure).
benchmark_ticker = "VOO"

[universe]
# Auto-screener picks top-N tickers from this file by composite momentum
# score each scan. Set enabled=false to disable.
enabled = true
path = "/config/universe.txt"
top_n = 10
# Persist screener picks into DB watchlist as source="auto" so active names
# stay in the recurring candidate pool instead of only being scanned once.
auto_add_to_watchlist = true
auto_watchlist_max = 50
# Dynamic top_n based on SPY regime (bullish/neutral/bearish)
dynamic_top_n = false
top_n_bullish = 15
top_n_neutral = 10
top_n_bearish = 5

[position]
# Per-position size = 10% of account ($10k @ $100k account).
# Total cap 95% allows ~9 concurrent positions; leaves 5% cash for fees/slippage.
position_size_pct = 0.10
max_total_exposure_pct = 0.95
# Per sector ≤ 30% — allows AI to concentrate when conviction is high
# (e.g., 3 ai_semi positions if all pass gates).
max_sector_exposure_pct = 0.30

[position_management]
# Runs PositionManagementAgent at end of each scan to re-evaluate held
# positions (HOLD / TIGHTEN_SL / TRIM_HALF / EXIT_NOW). Was disabled 2026-05-29
# while 3 apply-path bugs were fixed (commit 57536db); re-enabled 2026-06-01
# after live verification of the leg-detection fix.
enabled = true
min_age_hours = 6.0

[risk.sl_tp]
sl_atr_multiple = 1.5
tp_atr_multiple = 3.0
# Trailing stop sell submitted alongside the Bracket Order. Lets winners
# run beyond the fixed TP. Comment out to disable.
# Trail percent for trailing stops (used by future position_management agent
# only — bracket orders use static stop_loss, this is informational).
# Value is decimal: 0.08 = 8%, NOT 0.08%.
trail_percent = 0.08

[risk.thresholds]
# These are SANITY CAPS — real evaluation is relative + OOS in CompositeRiskGate.
max_drawdown = 0.50
min_sharpe = -0.5
min_win_rate = 0.0
min_profit_factor = 0.0
min_num_trades = 5

[risk.pdt]
# Pattern Day Trader protection. Off by default — paper trading is
# unaffected by FINRA PDT. Enable for live accounts with equity < $25k
# to prevent the 4th day trade in 5 business days that triggers a
# 90-day lockout.
enabled = false
min_equity = 25000.0
max_day_trades = 3

[backtest]
lookback_years = 3

[llm]
provider = "claude"
model = "claude-sonnet-4-6"
temperature = 0.0
# Reasoning depth for thinking-enabled models. "off" = no thinking,
# "low"/"medium"/"high" enable progressively more chain-of-thought budget
# (Claude only; Ark thinking is binary on/off but accepts the same setting).
# Note: not all models support thinking — doubao-seed-lite/doubao-pro don't,
# doubao-1-5-thinking-pro/deepseek-r1/claude-* do.
thinking_effort = "off"
prompt_template_path = "/config/prompts/momentum_strategist.md"
# Directory containing agent prompt templates (used by multi_agent mode)
prompts_dir = "/config/prompts"
# Whether to run analyst agents in parallel (faster wall-clock, costs 4x LLM calls)
agent_parallel = true
# anthropic_api_key = ""  # only used when provider=claude; set in local.toml or ANTHROPIC_API_KEY env
# ark_api_key = ""        # only used when provider=ark; set in local.toml or ARK_API_KEY env

[alpaca]
# api_key = ""      # set in local.toml or ALPACA_API_KEY env
# secret = ""       # set in local.toml or ALPACA_SECRET env

[data]
cache_dir = "/data/cache"
cache_ttl_hours = 4

[telegram]
chat_ids = []
retry_window_hours = 1
# bot_token = ""    # set in local.toml or TELEGRAM_BOT_TOKEN env

[capabilities]
# Deployment-level capability selection for future chat/agent surfaces.
# Capabilities expand to concrete tools; tools.include/exclude can override
# individual low-level tools.
enabled = [
  "research.analyze_ticker",
]

[tools]
include = []
exclude = []

[storage]
db_path = "/data/quanterback.sqlite"

[i18n]
# Global language for all user-facing text (TG bot replies, aggregated
# scan notifications, `quanterback report` output, etc.).
# Values: "en" or "zh".
language = "en"
templates_dir = "/config/templates"
# Display timezone for user-facing times. Storage and logs stay UTC.
# Examples: "America/Los_Angeles", "America/New_York", "Asia/Shanghai", "UTC"
timezone = "America/Los_Angeles"
